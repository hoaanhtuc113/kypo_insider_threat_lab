name: insider-threat-sandbox

hosts:
  - name: target-server
    flavor: standard.small
    base_box:
      image: ubuntu-22-04
      mgmt_user: ubuntu

routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-11
      mgmt_user: debian

networks:
  - name: exam-online-net
    cidr: 192.168.100.0/24

net_mappings:
  - host: target-server
    network: exam-online-net
    ip: 192.168.100.10

router_mappings:
  - router: router
    network: exam-online-net
    ip: 192.168.100.1

groups:
  - name: targets
    nodes:
      - target-server