name: insider-threat-sandbox

routers:
  - name: router
    base_box: debian-11

hosts:
  - name: target-server
    base_box: ubuntu-22-04
    # Ghi chú: Nếu hệ thống của bạn yêu cầu chỉ định tài nguyên, 
    # hãy thay bằng 'flavor: <tên_flavor_trên_openstack>' thay vì vcpu/ram.

networks:
  - name: exam_online_net
    cidr: 192.168.100.0/24

net_mappings:
  - host: target-server
    network: exam_online_net
    ip: 192.168.100.10

router_mappings:
  - router: router
    network: exam_online_net
    ip: 192.168.100.1