name: insider-threat-sandbox

hosts:
  - name: target-server
    flavor: standard.small
    base_box:
      image: ubuntu-22-04  # Phải khớp với tên image trên hệ thống cloud
      mgmt_user: ubuntu    # Bắt buộc khai báo user mặc định (ubuntu, debian, root...)

routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-11
      mgmt_user: debian

networks:
  - name: exam_online_net
    cidr: 192.168.100.0/24

net_mappings:
  - host: target-server
    network: exam_online_net
    ip: 192.168.100.10

router_mappings:
  - router: router
    network: exam_online_net
    ip: 192.168.100.1

groups:
  - name: targets
    nodes:
      - target-server